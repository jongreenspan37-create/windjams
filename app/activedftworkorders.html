<!DOCTYPE html>
<html>
<head>
    <title>Active Work Orders</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Current Active Work Orders</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Assigned Author</th>
            </tr>
        </thead>
        <tbody>
            {% for order in work_orders %}
            <tr>
                <td>{{ order.id }}</td>
                <td>{{ order.title }}</td>
                <td>{{ order.description }}</td>
                <!-- This works because of the Relationship in your model! -->
                <td><strong>{{ order.author.username }}</strong></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="/">← Return to Dashboard</a></p>
</body>
</html>
