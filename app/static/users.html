<!DOCTYPE html>
<html lang="en">
<head><title>User Directory</title></head>
<body>
    <h2>Employee Directory</h2>
    <table>
        <thead>
            <tr><th>ID</th><th>First Name</th><th>Surname</th></tr>
        </thead>
        <tbody id="userTableBody">
            <!-- JavaScript will inject rows here dynamically -->
        </tbody>
    </table>

    <script>
        // Automatically run this code when the web page finishes loading
        window.addEventListener("DOMContentLoaded", async () => {
            // 1. Fetch the clean JSON array of users from your API
            const response = await fetch("/api/users");
            const users = await response.json();

            const tableBody = document.getElementById("userTableBody");

            // 2. Loop through the array and build table rows dynamically
            users.forEach(user => {
                const row = `<tr>
                    <td>${user.id}</td>
                    <td>${user.first_name}</td>
                    <td>${user.last_name}</td>
                </tr>`;
                // Add the row to the bottom of our table
                tableBody.insertAdjacentHTML("beforeend", row);
            });
        });
    </script>
</body>
</html>
